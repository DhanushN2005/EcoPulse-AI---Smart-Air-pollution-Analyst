name: EcoPulse AI CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-assurance:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-cov black isort
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Static Analysis (Linting)
      run: |
        # E9, F63, F7, F82 check for syntax/undefined logic errors
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Global lint pass
        flake8 . --count --exit-zero --max-complexity=12 --max-line-length=120 --statistics

    - name: Format Integrity Check
      run: |
        black . --check
        isort . --check-only

    - name: Execute Suite & Coverage Report
      run: |
        # Run tests and generate coverage artifact
        pytest tests/ --cov=ecopulse_ai --cov-report=xml

    - name: Upload Coverage to Codecov (Optional/Placeholder)
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
